    <!--
      Anti-FOUC theme bootstrap. Runs synchronously before paint so users with a
      stored preference (or prefers-color-scheme: dark) don't see a light flash
      on initial load. Must read the same storage key as <ThemeProvider /> in
      src/components/theme-provider.tsx (next-themes default: "theme").
    -->
    <script>
      (function () {
        try {
          var stored = null;
          try { stored = localStorage.getItem("theme"); } catch (_) {}
          var prefersDark =
            typeof window.matchMedia === "function" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          var resolved =
            stored === "dark" || stored === "light"
              ? stored
              : prefersDark
              ? "dark"
              : "light";
          var root = document.documentElement;
          if (resolved === "dark") root.classList.add("dark");
          else root.classList.remove("dark");
          root.style.colorScheme = resolved;
        } catch (_) {
          // Fail open to the default light theme; the React provider will
          // reconcile after mount.
        }
      })();
    </script>
